<!DOCTYPE html>
<html>

<head>

<title>AI Payroll Offer Generator</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="container">

<h1>Offer Letter Payroll Generator</h1>
<p class="subtitle">Generate Offer Annexure & Send Email Instantly</p>

<div class="form-card">

<input id="name" placeholder="Employee Name">

<input id="designation" placeholder="Designation">

<input id="email" placeholder="Employee Email">

<input id="ctc" placeholder="Annual CTC (₹)">

<button onclick="generate()">Generate Offer Letter</button>

</div>

<div class="info">

<h2>What this tool does</h2>

<ul>
<li>Calculates payroll structure automatically</li>
<li>Generates professional Offer Annexure PDF</li>
<li>Sends the document directly to employee email</li>
<li>HR automation tool</li>
</ul>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
